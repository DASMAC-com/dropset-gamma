---
description: 'Install anchor-cli v2'
inputs:
  revision:
    description: 'anchor-cli revision (git commit hash) to install'
    required: true
name: 'Install anchor-cli v2'
runs:
  steps:
  - id: 'cache-anchor'
    name: 'Restore anchor-cli cache'
    uses: 'actions/cache/restore@v5'
    with:
      key: 'anchor-cli-${{ inputs.revision }}-${{ runner.os }}-${{
            runner.arch }}'
      path: '~/.cargo/bin/anchor'
  - env:
      CARGO_PROFILE_RELEASE_LTO: 'off'
    if: 'steps.cache-anchor.outputs.cache-hit != ''true'''
    name: 'Install anchor-cli v2'
    run: |
      cargo install \
        --git https://github.com/solana-foundation/anchor.git \
        --rev ${{ inputs.revision }} \
        anchor-cli --locked --force
    shell: 'sh'
  - if: 'steps.cache-anchor.outputs.cache-hit != ''true'''
    name: 'Save anchor-cli cache'
    uses: 'actions/cache/save@v5'
    with:
      key: 'anchor-cli-${{ inputs.revision }}-${{ runner.os }}-${{
            runner.arch }}'
      path: '~/.cargo/bin/anchor'
  # Assumes the caller has checked out a tree containing the Makefile.
  - name: 'Verify anchor-cli'
    run: 'make check-anchor-v2'
    shell: 'sh'
  using: 'composite'
...
